work:
  - role: PhD Researcher
    org: Nicolaus Copernicus Astronomical Center, Poland
    start: 2025-12-08
    summary: |
      Working on detached eclipsing binaries and stellar evolution through precise stellar parameter determination. Supervisor: Dr. Krzysztof Helminiak.
  - role: International Exchange Program (Master's Thesis)
    org: Universidad Nacional de La Plata, Argentina
    start: 2025-03-01
    end: 2025-08-01
    summary: |
      Search for B/Be stars in open cluster Trumpler 11 using photometric and spectroscopic data from Gemini Observatory. Skills: Stellar Astrophysics, Photometry, Spectroscopy.
  - role: Summer Intern
    org: AstroParticule et Cosmologie (APC) laboratory, Université Paris Cité
    start: 2023-06-01
    end: 2023-08-01
    summary: |
      Supervisor: Prof. Sylvain Chaty. Worked on the catalogue of Low-mass X-ray Binaries (LMXBs). Skills: Intense literature review and X-ray binaries spectral study.
  - role: B.Tech Final Year Project (Bachelor's Thesis)
    org: Delhi Technological University
    start: 2022-08-01
    end: 2023-07-01
    summary: |
      Analysis of machine learning algorithms to determine membership probability of stars in clusters using Gaia DR3 data. Skills: GMM, DBSCAN, and pyUPMASK in Python, scientific writing and group management.
  - role: Summer Intern
    org: Indian Institute of Technology, Hyderabad
    start: 2022-06-01
    end: 2023-07-01
    summary: |
      Simulated populations of repeating Fast Radio Bursts (FRBs) sources across the sky. Determined observation patterns of RFRBs by CHIME and its hypothetical variants over a two-year observation run. Skills: Simulations in Python and radio observations.
  - role: Krittika Summer Project 3.0
    org: Indian Institute of Technology, Bombay
    start: 2022-06-01
    end: 2022-09-01
    summary: |
      Photometric analysis using SExtractor and PSFEx to obtain a color-magnitude diagram and determine the age of the star population of globular clusters using PanSTARRS data. Skills: Photometry.
  - role: Educator (Experimental Science) and Subject Matter Expert
    org: SciComm
    start: 2019-12-01
    end: 2020-09-01
    summary: |
      Taught Science and Astronomy to students at schools and Astrocamps. Night sky observation using telescopes and astrophotography. Authored a high-school-level computer science book for CUET entrance exam (May 2022). Skills: Science communication.

